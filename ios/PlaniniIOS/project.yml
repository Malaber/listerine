name: PlaniniApp
options:
  minimumXcodeGenVersion: 2.38.0
packages:
  PlaniniCore:
    path: .
targets:
  Planini:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Assets.xcassets
      - path: ../../app/locales
        name: locales
        buildPhase: resources
    dependencies:
      - target: PlaniniWatchApp
        embed: true
      - package: PlaniniCore
        product: PlaniniCore
    settings:
      base:
        PRODUCT_NAME: Planini
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: App/Planini.entitlements
        PROVISIONING_PROFILE_SPECIFIER: $(PLANINI_APP_PROFILE_NAME)
        INFOPLIST_KEY_PlaniniBackendBaseURL: https://planini.top
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Planini
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.food-and-drink
    preBuildScripts:
      - name: Check Generated App Icons
        inputFiles:
          - $(PROJECT_DIR)/../../app/web/static/img/planini.svg
        outputFiles:
          - $(DERIVED_FILE_DIR)/check-generated-app-icons.stamp
        script: |
          set -euo pipefail

          icon_dir="${PROJECT_DIR}/Assets.xcassets/AppIcon.appiconset"

          missing=0
          for file in \
            Icon-20@2x.png \
            Icon-20@3x.png \
            Icon-29@2x.png \
            Icon-29@3x.png \
            Icon-40@2x.png \
            Icon-40@3x.png \
            Icon-60@2x.png \
            Icon-60@3x.png \
            Icon-1024.png
          do
            if [ ! -f "${icon_dir}/${file}" ]; then
              echo "error: Missing generated app icon: ${icon_dir}/${file}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            echo "error: Run from repo root: .venv/bin/inv generate-ios-app-icons"
            exit 1
          fi

          touch "${SCRIPT_OUTPUT_FILE_0}"
  PlaniniWatchApp:
    type: com.apple.product-type.application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
        excludes:
          - "*.swift"
          - "*.plist"
      - path: Assets.xcassets
    dependencies:
      - target: PlaniniWatchExtension
        embed: true
      - target: PlaniniWatchWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_NAME: Planini Watch
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.watchkitapp
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        PROVISIONING_PROFILE_SPECIFIER: $(PLANINI_WATCH_APP_PROFILE_NAME)
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
    preBuildScripts:
      - name: Check Generated Watch App Icons
        inputFiles:
          - $(PROJECT_DIR)/../../app/web/static/img/planini.svg
        outputFiles:
          - $(DERIVED_FILE_DIR)/check-generated-watch-app-icons.stamp
        script: |
          set -euo pipefail

          icon_dir="${PROJECT_DIR}/Assets.xcassets/WatchAppIcon.appiconset"

          missing=0
          for file in \
            Icon-24@2x.png \
            Icon-27.5@2x.png \
            Icon-29@2x.png \
            Icon-29@3x.png \
            Icon-40@2x.png \
            Icon-44@2x.png \
            Icon-50x50@2x.png \
            Icon-86@2x.png \
            Icon-98@2x.png \
            Icon-108@2x.png \
            Icon-1024.png
          do
            if [ ! -f "${icon_dir}/${file}" ]; then
              echo "error: Missing generated watch app icon: ${icon_dir}/${file}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            echo "error: Run from repo root: .venv/bin/inv generate-ios-app-icons"
            exit 1
          fi

          touch "${SCRIPT_OUTPUT_FILE_0}"
  PlaniniWatchExtension:
    type: com.apple.product-type.watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: WatchShared
    dependencies:
      - package: PlaniniCore
        product: PlaniniCore
    settings:
      base:
        PRODUCT_NAME: Planini Watch Extension
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.watchkitapp.watchkitextension
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        PROVISIONING_PROFILE_SPECIFIER: $(PLANINI_WATCH_EXTENSION_PROFILE_NAME)
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchApp/ExtensionInfo.plist
        CODE_SIGN_ENTITLEMENTS: WatchApp/PlaniniWatch.entitlements
  PlaniniWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchWidget
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: WatchShared
    dependencies:
      - package: PlaniniCore
        product: PlaniniCore
    settings:
      base:
        PRODUCT_NAME: Planini Watch Widgets
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.watchkitapp.widget
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        PROVISIONING_PROFILE_SPECIFIER: $(PLANINI_WATCH_WIDGET_PROFILE_NAME)
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchWidget/PlaniniWatchWidget.entitlements
  PlaniniUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: UITests
    dependencies:
      - target: Planini
    settings:
      base:
        PRODUCT_NAME: PlaniniUITests
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.ui-tests
        DEVELOPMENT_TEAM: VWKG94374J
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Planini
schemes:
  Planini:
    build:
      targets:
        Planini: all
        PlaniniWatchApp: all
        PlaniniWatchExtension: all
        PlaniniWatchWidgetExtension: all
    test:
      gatherCoverageData: false
      environmentVariables:
        PLANINI_UI_TEST_BASE_URL: $(PLANINI_UI_TEST_BASE_URL)
        PLANINI_UI_TEST_BOOTSTRAP_BASE_URL: $(PLANINI_UI_TEST_BOOTSTRAP_BASE_URL)
        PLANINI_UI_TEST_USER_EMAIL: $(PLANINI_UI_TEST_USER_EMAIL)
        PLANINI_UI_TEST_ARTIFACT_DIR: $(PLANINI_UI_TEST_ARTIFACT_DIR)
        PLANINI_UI_TEST_INITIAL_LIST_NAME: $(PLANINI_UI_TEST_INITIAL_LIST_NAME)
        PLANINI_UI_TEST_ACCESS_TOKEN: $(PLANINI_UI_TEST_ACCESS_TOKEN)
        PLANINI_UI_TEST_DISPLAY_NAME: $(PLANINI_UI_TEST_DISPLAY_NAME)
      targets:
        - name: PlaniniUITests
