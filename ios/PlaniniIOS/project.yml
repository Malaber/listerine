name: PlaniniApp
options:
  minimumXcodeGenVersion: 2.38.0
packages:
  PlaniniCore:
    path: .
targets:
  Planini:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Assets.xcassets
        type: folder
    dependencies:
      - target: PlaniniWatchApp
        embed: true
      - package: PlaniniCore
        product: PlaniniCore
    settings:
      base:
        PRODUCT_NAME: Planini
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: App/Planini.entitlements
        INFOPLIST_KEY_PlaniniBackendBaseURL: https://planini.malaber.de
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Planini
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.food-and-drink
  PlaniniWatchApp:
    type: com.apple.product-type.application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
        excludes:
          - "*.swift"
          - "*.plist"
    dependencies:
      - target: PlaniniWatchExtension
        embed: true
      - target: PlaniniWatchWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_NAME: Planini Watch
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.watchkitapp
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchApp/Info.plist
  PlaniniWatchExtension:
    type: com.apple.product-type.watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: WatchShared
    dependencies:
      - package: PlaniniCore
        product: PlaniniCore
    settings:
      base:
        PRODUCT_NAME: Planini Watch Extension
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.watchkitapp.watchkitextension
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchApp/ExtensionInfo.plist
        CODE_SIGN_ENTITLEMENTS: WatchApp/PlaniniWatch.entitlements
  PlaniniWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchWidget
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: WatchShared
    dependencies:
      - package: PlaniniCore
        product: PlaniniCore
    settings:
      base:
        PRODUCT_NAME: Planini Watch Widgets
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.watchkitapp.widget
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchWidget/PlaniniWatchWidget.entitlements
  PlaniniUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: UITests
    dependencies:
      - target: Planini
    settings:
      base:
        PRODUCT_NAME: PlaniniUITests
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.planini.ui-tests
        DEVELOPMENT_TEAM: VWKG94374J
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Planini
schemes:
  Planini:
    build:
      targets:
        Planini: all
        PlaniniWatchApp: all
        PlaniniWatchExtension: all
        PlaniniWatchWidgetExtension: all
    test:
      gatherCoverageData: false
      targets:
        - name: PlaniniUITests
