name: ListerineApp
options:
  minimumXcodeGenVersion: 2.38.0
packages:
  ListerineCore:
    path: .
targets:
  Listerine:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Assets.xcassets
        type: folder
    dependencies:
      - target: ListerineWatchApp
        embed: true
      - package: ListerineCore
        product: ListerineCore
    settings:
      base:
        PRODUCT_NAME: Listerine
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.listerine
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: App/Listerine.entitlements
        INFOPLIST_KEY_ListerineBackendBaseURL: https://listerine.malaber.de
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Listerine
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.food-and-drink
  ListerineWatchApp:
    type: com.apple.product-type.application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
        excludes:
          - "*.swift"
          - "*.plist"
    dependencies:
      - target: ListerineWatchExtension
        embed: true
      - target: ListerineWatchWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_NAME: Listerine Watch
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.listerine.watchkitapp
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchApp/Info.plist
  ListerineWatchExtension:
    type: com.apple.product-type.watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: WatchShared
    dependencies:
      - package: ListerineCore
        product: ListerineCore
    settings:
      base:
        PRODUCT_NAME: Listerine Watch Extension
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.listerine.watchkitapp.watchkitextension
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchApp/ExtensionInfo.plist
        CODE_SIGN_ENTITLEMENTS: WatchApp/ListerineWatch.entitlements
  ListerineWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchWidget
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: WatchShared
    dependencies:
      - package: ListerineCore
        product: ListerineCore
    settings:
      base:
        PRODUCT_NAME: Listerine Watch Widgets
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.listerine.watchkitapp.widget
        DEVELOPMENT_TEAM: VWKG94374J
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchWidget/ListerineWatchWidget.entitlements
  ListerineUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: UITests
    dependencies:
      - target: Listerine
    settings:
      base:
        PRODUCT_NAME: ListerineUITests
        PRODUCT_BUNDLE_IDENTIFIER: de.malaber.listerine.ui-tests
        DEVELOPMENT_TEAM: VWKG94374J
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Listerine
schemes:
  Listerine:
    build:
      targets:
        Listerine: all
        ListerineWatchApp: all
        ListerineWatchExtension: all
        ListerineWatchWidgetExtension: all
    test:
      gatherCoverageData: false
      targets:
        - name: ListerineUITests
