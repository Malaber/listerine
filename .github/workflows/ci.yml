name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: PYTHONPATH=. black --check .
      - run: PYTHONPATH=. flake8 .
      - run: PYTHONPATH=. pytest

  javascript_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run test:js

  browser_e2e:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: '3.14'
      NODE_VERSION: '24'
      DATABASE_URL: sqlite+aiosqlite:///./tmp-ci-ui-e2e.db
      SEED_DATA_PATH: app/fixtures/review_seed_e2e.json
      WEBAUTHN_RP_ID: localhost
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: npm install --no-save playwright
      - run: npx playwright install --with-deps chromium
      - name: Start review app
        run: |
          PYTHONPATH=. uvicorn app.main:app --host 127.0.0.1 --port 8000 > ui-e2e-server.log 2>&1 &
          echo $! > ui-e2e-server.pid
      - name: Wait for review app
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Review app never became healthy" >&2
          cat ui-e2e-server.log >&2
          exit 1
      - name: Run browser ui e2e
        run: PREVIEW_BASE_URL=http://localhost:8000 E2E_SEED_PATH=app/fixtures/review_seed_e2e.json node scripts/run_ui_e2e.mjs
      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: browser-ui-e2e
          retention-days: 2
          path: |
            e2e-artifacts/ui-e2e
            ui-e2e-server.log
      - name: Add browser summary
        if: always()
        run: |
          if [ -f e2e-artifacts/ui-e2e/summary.md ]; then
            cat e2e-artifacts/ui-e2e/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Stop review app
        if: always()
        run: |
          if [ -f ui-e2e-server.pid ]; then
            kill "$(cat ui-e2e-server.pid)" || true
          fi

  swift_test:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift package tests with coverage gate
        run: cd ios/ListerineIOS && ./Scripts/check_coverage.sh
