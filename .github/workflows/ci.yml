name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python_black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke black-check

  python_flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke flake8-check

  python_pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke test-python

  javascript_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke install-js
      - run: python -m invoke check-js

  browser_e2e:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: '3.14'
      NODE_VERSION: '24'
      DATABASE_URL: sqlite+aiosqlite:///./tmp-ci-ui-e2e.db
      SEED_DATA_PATH: app/fixtures/review_seed_e2e.json
      WEBAUTHN_RP_ID: localhost
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - run: python -m invoke install-js
      - run: python -m invoke install-browser --with-deps
      - name: Run browser ui e2e (desktop + iphone)
        run: >-
          python -m invoke browser-e2e
          --base-url=http://localhost:8000
          --seed-path=${{ env.SEED_DATA_PATH }}
          --database-url=${{ env.DATABASE_URL }}
          --webauthn-rp-id=${{ env.WEBAUTHN_RP_ID }}
          --artifact-root=e2e-artifacts
      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: browser-ui-e2e
          retention-days: 2
          path: |
            e2e-artifacts/ui-e2e-desktop
            e2e-artifacts/ui-e2e-iphone
            ui-e2e-server.log
      - name: Add browser summary
        if: always()
        run: |
          if [ -f e2e-artifacts/ui-e2e-desktop/summary.md ]; then
            echo "### Desktop UI e2e" >> "$GITHUB_STEP_SUMMARY"
            cat e2e-artifacts/ui-e2e-desktop/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f e2e-artifacts/ui-e2e-iphone/summary.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### iPhone UI e2e" >> "$GITHUB_STEP_SUMMARY"
            cat e2e-artifacts/ui-e2e-iphone/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
  swift_test:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift package tests with coverage gate
        run: cd ios/ListerineIOS && ./Scripts/check_coverage.sh

  version:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      git_tag: ${{ steps.version.outputs.git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke bootstrap-ci
      - name: Compute release version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: python -m invoke compute-version

  docker_build_platform:
    runs-on: ubuntu-latest
    needs:
      - version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_suffix: linux-amd64
          - platform: linux/arm64
            artifact_suffix: linux-arm64
    steps:
      - uses: actions/checkout@v6
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            LISTERINE_VERSION=${{ needs.version.outputs.release_version }}
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.artifact_suffix }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.artifact_suffix }}
      - name: Export image digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/docker-digests
          touch "/tmp/docker-digests/${IMAGE_DIGEST#sha256:}"
      - name: Upload image digest artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-digest-${{ matrix.artifact_suffix }}
          path: /tmp/docker-digests/*
          if-no-files-found: error
          retention-days: 1
      - name: Add platform build summary
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          {
            echo "## Docker platform build summary"
            echo
            printf 'Published platform image: `%s@%s`\n' "$IMAGE" "$IMAGE_DIGEST"
            printf 'Platform: `%s`\n' "$PLATFORM"
          } >> "$GITHUB_STEP_SUMMARY"

  docker_build:
    runs-on: ubuntu-latest
    needs:
      - docker_build_platform
      - version
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.merge.outputs.digest }}
      primary_tag: ${{ steps.tags.outputs.primary_tag }}
    steps:
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          PRIMARY_TAG="sha-$PUSH_SHA"
          {
            echo "primary_tag=$PRIMARY_TAG"
            echo "tags<<EOF"
            echo "$IMAGE:$PRIMARY_TAG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download image digest artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: docker-digest-*
          path: /tmp/docker-digests
          merge-multiple: true
      - name: Merge platform images into multi-arch manifest
        id: merge
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          TAGS: ${{ steps.tags.outputs.tags }}
          IMAGE_TAG: ${{ steps.tags.outputs.primary_tag }}
        run: |
          tags=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tags+=(--tag "$tag")
          done <<EOF
          $TAGS
          EOF

          sources=()
          for digest_file in /tmp/docker-digests/*; do
            [ -e "$digest_file" ] || continue
            sources+=("$IMAGE@sha256:$(basename "$digest_file")")
          done

          if [ "${#sources[@]}" -eq 0 ]; then
            echo "No platform digests were downloaded for manifest creation." >&2
            exit 1
          fi

          docker buildx imagetools create "${tags[@]}" "${sources[@]}"

          digest="$(docker buildx imagetools inspect "$IMAGE:$IMAGE_TAG" | awk '/Digest:/ { print $2; exit }')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Add docker build summary
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_TAG: ${{ steps.tags.outputs.primary_tag }}
          IMAGE_DIGEST: ${{ steps.merge.outputs.digest }}
        run: |
          docker buildx imagetools inspect "$IMAGE:$IMAGE_TAG" > docker-image-inspect.txt
          {
            echo "## Docker image publish summary"
            echo
            printf 'Published image: `%s`\n' "$IMAGE:$IMAGE_TAG"
            printf 'Manifest digest: `%s`\n' "$IMAGE_DIGEST"
            echo
            echo "### Published platforms"
            awk '/Platform:/ { printf "- `%s`\n", $2 }' docker-image-inspect.txt
            echo
            echo "### Inspection output"
            echo '```text'
            cat docker-image-inspect.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
