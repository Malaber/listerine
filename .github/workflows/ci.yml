name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: python -m invoke check-python

  javascript_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: python -m pip install invoke
      - run: python -m invoke install-js
      - run: python -m invoke check-js

  browser_e2e:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: '3.14'
      NODE_VERSION: '24'
      DATABASE_URL: sqlite+aiosqlite:///./tmp-ci-ui-e2e.db
      SEED_DATA_PATH: app/fixtures/review_seed_e2e.json
      WEBAUTHN_RP_ID: localhost
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: python -m invoke install-js
      - run: python -m invoke install-browser --with-deps
      - name: Run browser ui e2e
        run: >-
          python -m invoke check-browser-e2e
          --seed-path=${{ env.SEED_DATA_PATH }}
          --e2e-seed-path=${{ env.SEED_DATA_PATH }}
          --database-url=${{ env.DATABASE_URL }}
          --webauthn-rp-id=${{ env.WEBAUTHN_RP_ID }}
      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: browser-ui-e2e
          retention-days: 2
          path: |
            e2e-artifacts/ui-e2e
            ui-e2e-server.log
      - name: Add browser summary
        if: always()
        run: |
          if [ -f e2e-artifacts/ui-e2e/summary.md ]; then
            cat e2e-artifacts/ui-e2e/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

  swift_test:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift package tests with coverage gate
        run: cd ios/ListerineIOS && ./Scripts/check_coverage.sh
