name: iOS Build and TestFlight

on:
  push:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload a signed build to TestFlight'
        required: true
        default: false
        type: boolean
      review_pr_number:
        description: 'PR number for the review backend build. Leave empty to auto-detect from the branch.'
        required: false
        type: string
      export_ad_hoc:
        description: 'Export ad-hoc IPAs as artifacts for local device installs'
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      git_tag: ${{ steps.version.outputs.git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Invoke
        run: python -m pip install invoke
      - name: Compute version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: python -m invoke compute-version

  review_context:
    runs-on: ubuntu-latest
    outputs:
      review_pr_number: ${{ steps.review.outputs.review_pr_number }}
      review_backend_url: ${{ steps.review.outputs.review_backend_url }}
    steps:
      - name: Resolve review backend
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_REVIEW_PR_NUMBER: ${{ inputs.review_pr_number }}
        run: |
          pr_number="$INPUT_REVIEW_PR_NUMBER"
          if [ -z "$pr_number" ] && [ "$GITHUB_REF_TYPE" = "branch" ]; then
            pr_number="$(
              gh api \
                "/repos/$GITHUB_REPOSITORY/pulls?head=$GITHUB_REPOSITORY_OWNER:$GITHUB_REF_NAME&state=open" \
                --jq '.[0].number // empty'
            )"
          fi

          if [ -n "$pr_number" ]; then
            echo "review_pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "review_backend_url=https://pr-$pr_number.pr.planini.malaber.de" >> "$GITHUB_OUTPUT"
          fi

  ios_backend_e2e:
    runs-on: macos-latest
    env:
      PYTHON_VERSION: '3.14'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Invoke
        run: python -m pip install invoke
      - name: Bootstrap backend dependencies
        run: python -m invoke bootstrap-ci
      - name: Run native iOS backend e2e
        run: python -m invoke check-ios-e2e

  ios_ui_e2e:
    runs-on: macos-latest
    env:
      PYTHON_VERSION: '3.14'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Invoke
        run: python -m pip install invoke
      - name: Install native image dependencies
        run: brew install cairo
      - name: Expose native image library path
        run: echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix cairo)/lib:/opt/homebrew/lib:/usr/local/lib" >> "$GITHUB_ENV"
      - name: Bootstrap backend dependencies
        run: python -m invoke bootstrap-ci
      - name: Install XcodeGen
        run: python -m invoke install-xcodegen
      - name: Run native iOS UI e2e
        run: python -m invoke check-ios-ui-e2e
      - name: Upload native iOS UI artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-native-ui-e2e
          retention-days: 2
          path: |
            e2e-artifacts/ios-ui-e2e
            ios-ui-e2e-server.log

  upload_testflight:
    needs:
      - version
      - review_context
    if: >-
      github.repository_owner == 'Malaber' &&
      needs.review_context.outputs.review_pr_number != '' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight)
      )
    runs-on: macos-latest
    environment: testflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: production
            build_offset: 1
          - variant: review
            build_offset: 2
    env:
      PYTHON_VERSION: '3.14'
      IOS_MARKETING_VERSION: ${{ needs.version.outputs.base_version }}
      IOS_BUILD_NUMBER: ${{ github.run_number }}.${{ github.run_attempt }}.${{ matrix.build_offset }}
      IOS_VARIANT: ${{ matrix.variant }}
      REVIEW_BACKEND_URL: ${{ needs.review_context.outputs.review_backend_url }}
      EXPORT_AD_HOC: ${{ github.event_name == 'workflow_dispatch' && inputs.export_ad_hoc }}
      IOS_PRODUCTION_BACKEND_URL: ${{ vars.IOS_PRODUCTION_BACKEND_URL }}
      IOS_PRODUCTION_PASSKEY_DOMAIN: ${{ vars.IOS_PRODUCTION_PASSKEY_DOMAIN }}
      IOS_REVIEW_PASSKEY_DOMAIN: ${{ vars.IOS_REVIEW_PASSKEY_DOMAIN }}
      APPLE_TEAM_ID: VWKG94374J
      IOS_BUNDLE_IDENTIFIER: de.malaber.planini
      IOS_REVIEW_BUNDLE_IDENTIFIER: ${{ secrets.IOS_REVIEW_BUNDLE_IDENTIFIER }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      BUILD_PROVISION_PROFILE_NAME: planini
      BUILD_WATCH_APP_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_WATCH_APP_PROVISION_PROFILE_BASE64 }}
      BUILD_WATCH_APP_PROVISION_PROFILE_NAME: planini-watch-app
      BUILD_WATCH_EXTENSION_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_WATCH_EXTENSION_PROVISION_PROFILE_BASE64 }}
      BUILD_WATCH_EXTENSION_PROVISION_PROFILE_NAME: planini-watch-extension
      BUILD_WATCH_WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_WATCH_WIDGET_PROVISION_PROFILE_BASE64 }}
      BUILD_WATCH_WIDGET_PROVISION_PROFILE_NAME: planini-watch-widget
      BUILD_REVIEW_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_REVIEW_PROVISION_PROFILE_BASE64 }}
      BUILD_REVIEW_PROVISION_PROFILE_NAME: ${{ secrets.BUILD_REVIEW_PROVISION_PROFILE_NAME }}
      BUILD_REVIEW_WATCH_APP_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_REVIEW_WATCH_APP_PROVISION_PROFILE_BASE64 }}
      BUILD_REVIEW_WATCH_APP_PROVISION_PROFILE_NAME: ${{ secrets.BUILD_REVIEW_WATCH_APP_PROVISION_PROFILE_NAME }}
      BUILD_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_BASE64 }}
      BUILD_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_NAME: ${{ secrets.BUILD_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_NAME }}
      BUILD_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_BASE64 }}
      BUILD_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_NAME: ${{ secrets.BUILD_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_NAME }}
      AD_HOC_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_PROVISION_PROFILE_BASE64 }}
      AD_HOC_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_PROVISION_PROFILE_NAME }}
      AD_HOC_WATCH_APP_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_WATCH_APP_PROVISION_PROFILE_BASE64 }}
      AD_HOC_WATCH_APP_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_WATCH_APP_PROVISION_PROFILE_NAME }}
      AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_BASE64 }}
      AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_NAME }}
      AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_BASE64 }}
      AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_NAME }}
      AD_HOC_REVIEW_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_REVIEW_PROVISION_PROFILE_BASE64 }}
      AD_HOC_REVIEW_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_REVIEW_PROVISION_PROFILE_NAME }}
      AD_HOC_REVIEW_WATCH_APP_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_REVIEW_WATCH_APP_PROVISION_PROFILE_BASE64 }}
      AD_HOC_REVIEW_WATCH_APP_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_REVIEW_WATCH_APP_PROVISION_PROFILE_NAME }}
      AD_HOC_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_BASE64 }}
      AD_HOC_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_NAME }}
      AD_HOC_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_BASE64 }}
      AD_HOC_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_NAME: ${{ secrets.AD_HOC_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_NAME }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Invoke
        run: python -m pip install invoke
      - name: Install native image dependencies
        run: brew install cairo
      - name: Expose native image library path
        run: echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix cairo)/lib:/opt/homebrew/lib:/usr/local/lib" >> "$GITHUB_ENV"
      - name: Bootstrap backend dependencies
        run: python -m invoke bootstrap-ci
      - name: Resolve iOS variant
        id: variant
        run: |
          case "$IOS_VARIANT" in
            production)
              backend_url="${IOS_PRODUCTION_BACKEND_URL:-https://planini.top}"
              passkey_domain="${IOS_PRODUCTION_PASSKEY_DOMAIN:-planini.top}"
              bundle_id="$IOS_BUNDLE_IDENTIFIER"
              profile_name="$BUILD_PROVISION_PROFILE_NAME"
              watch_app_profile_name="$BUILD_WATCH_APP_PROVISION_PROFILE_NAME"
              watch_extension_profile_name="$BUILD_WATCH_EXTENSION_PROVISION_PROFILE_NAME"
              watch_widget_profile_name="$BUILD_WATCH_WIDGET_PROVISION_PROFILE_NAME"
              app_display_name="Planini"
              ;;
            review)
              if [ -z "$REVIEW_BACKEND_URL" ]; then
                echo "No open PR or review_pr_number input found; skipping review build."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              backend_url="$REVIEW_BACKEND_URL"
              passkey_domain="${IOS_REVIEW_PASSKEY_DOMAIN:-pr.planini.malaber.de}"
              bundle_id="${IOS_REVIEW_BUNDLE_IDENTIFIER:-$IOS_BUNDLE_IDENTIFIER}"
              profile_name="${BUILD_REVIEW_PROVISION_PROFILE_NAME:-$BUILD_PROVISION_PROFILE_NAME}"
              watch_app_profile_name="${BUILD_REVIEW_WATCH_APP_PROVISION_PROFILE_NAME:-$BUILD_WATCH_APP_PROVISION_PROFILE_NAME}"
              watch_extension_profile_name="${BUILD_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_NAME:-$BUILD_WATCH_EXTENSION_PROVISION_PROFILE_NAME}"
              watch_widget_profile_name="${BUILD_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_NAME:-$BUILD_WATCH_WIDGET_PROVISION_PROFILE_NAME}"
              app_display_name="Planini Review"
              ;;
            *)
              echo "Unknown variant: $IOS_VARIANT" >&2
              exit 1
              ;;
          esac

          {
            echo "skip=false"
            echo "backend_url=$backend_url"
            echo "passkey_domain=$passkey_domain"
            echo "bundle_id=$bundle_id"
            echo "profile_name=$profile_name"
            echo "watch_app_profile_name=$watch_app_profile_name"
            echo "watch_extension_profile_name=$watch_extension_profile_name"
            echo "watch_widget_profile_name=$watch_widget_profile_name"
            echo "app_display_name=$app_display_name"
            echo "ipa_basename=Planini-$IOS_VARIANT-$IOS_MARKETING_VERSION-$IOS_BUILD_NUMBER"
          } >> "$GITHUB_OUTPUT"
      - name: Validate signing secrets
        if: steps.variant.outputs.skip != 'true'
        run: |
          missing=0
          for var in APPLE_TEAM_ID KEYCHAIN_PASSWORD BUILD_CERTIFICATE_BASE64 P12_PASSWORD APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              missing=1
            fi
          done
          if [ -z "${{ steps.variant.outputs.bundle_id }}" ]; then
            echo "Missing bundle identifier for $IOS_VARIANT" >&2
            missing=1
          fi
          if [ -z "${{ steps.variant.outputs.profile_name }}" ]; then
            echo "Missing App Store provisioning profile name for $IOS_VARIANT" >&2
            missing=1
          fi
          case "$IOS_VARIANT" in
            production)
              profile_base64="$BUILD_PROVISION_PROFILE_BASE64"
              watch_app_profile_base64="$BUILD_WATCH_APP_PROVISION_PROFILE_BASE64"
              watch_extension_profile_base64="$BUILD_WATCH_EXTENSION_PROVISION_PROFILE_BASE64"
              watch_widget_profile_base64="$BUILD_WATCH_WIDGET_PROVISION_PROFILE_BASE64"
              ;;
            review)
              profile_base64="${BUILD_REVIEW_PROVISION_PROFILE_BASE64:-$BUILD_PROVISION_PROFILE_BASE64}"
              watch_app_profile_base64="${BUILD_REVIEW_WATCH_APP_PROVISION_PROFILE_BASE64:-$BUILD_WATCH_APP_PROVISION_PROFILE_BASE64}"
              watch_extension_profile_base64="${BUILD_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_BASE64:-$BUILD_WATCH_EXTENSION_PROVISION_PROFILE_BASE64}"
              watch_widget_profile_base64="${BUILD_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_BASE64:-$BUILD_WATCH_WIDGET_PROVISION_PROFILE_BASE64}"
              ;;
          esac
          if [ -z "$profile_base64" ]; then
            echo "Missing App Store provisioning profile for $IOS_VARIANT" >&2
            missing=1
          fi
          if [ -z "$watch_app_profile_base64" ] || [ -z "${{ steps.variant.outputs.watch_app_profile_name }}" ]; then
            echo "Missing App Store watch app provisioning profile or profile name for $IOS_VARIANT" >&2
            missing=1
          fi
          if [ -z "$watch_extension_profile_base64" ] || [ -z "${{ steps.variant.outputs.watch_extension_profile_name }}" ]; then
            echo "Missing App Store watch extension provisioning profile or profile name for $IOS_VARIANT" >&2
            missing=1
          fi
          if [ -z "$watch_widget_profile_base64" ] || [ -z "${{ steps.variant.outputs.watch_widget_profile_name }}" ]; then
            echo "Missing App Store watch widget provisioning profile or profile name for $IOS_VARIANT" >&2
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Install XcodeGen
        if: steps.variant.outputs.skip != 'true'
        run: python -m invoke install-xcodegen
      - name: Configure iOS app variant
        if: steps.variant.outputs.skip != 'true'
        run: |
          python -m invoke configure-ios-app \
            --backend-url="${{ steps.variant.outputs.backend_url }}" \
            --passkey-domain="${{ steps.variant.outputs.passkey_domain }}" \
            --bundle-id="${{ steps.variant.outputs.bundle_id }}" \
            --development-team="$APPLE_TEAM_ID" \
            --no-regenerate-project
      - name: Generate app icons
        if: steps.variant.outputs.skip != 'true'
        run: python -m invoke generate-ios-app-icons
      - name: Generate Xcode project
        if: steps.variant.outputs.skip != 'true'
        run: cd ios/PlaniniIOS && xcodegen generate
      - name: Install signing certificate
        if: steps.variant.outputs.skip != 'true'
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
      - name: Install provisioning profile
        if: steps.variant.outputs.skip != 'true'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          install_profile() {
            profile_base64="$1"
            label="$2"
            raw_path="$RUNNER_TEMP/$label.mobileprovision"
            plist_path="$RUNNER_TEMP/$label.plist"
            echo "$profile_base64" | base64 --decode > "$raw_path"
            security cms -D -i "$raw_path" > "$plist_path"
            uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$plist_path")"
            name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$plist_path")"
            cp "$raw_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
            echo "Installed provisioning profile '$name' for $label."
          }

          case "$IOS_VARIANT" in
            production)
              app_profile_base64="$BUILD_PROVISION_PROFILE_BASE64"
              watch_app_profile_base64="$BUILD_WATCH_APP_PROVISION_PROFILE_BASE64"
              watch_extension_profile_base64="$BUILD_WATCH_EXTENSION_PROVISION_PROFILE_BASE64"
              watch_widget_profile_base64="$BUILD_WATCH_WIDGET_PROVISION_PROFILE_BASE64"
              ;;
            review)
              app_profile_base64="${BUILD_REVIEW_PROVISION_PROFILE_BASE64:-$BUILD_PROVISION_PROFILE_BASE64}"
              watch_app_profile_base64="${BUILD_REVIEW_WATCH_APP_PROVISION_PROFILE_BASE64:-$BUILD_WATCH_APP_PROVISION_PROFILE_BASE64}"
              watch_extension_profile_base64="${BUILD_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_BASE64:-$BUILD_WATCH_EXTENSION_PROVISION_PROFILE_BASE64}"
              watch_widget_profile_base64="${BUILD_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_BASE64:-$BUILD_WATCH_WIDGET_PROVISION_PROFILE_BASE64}"
              ;;
          esac
          install_profile "$app_profile_base64" "planini-$IOS_VARIANT-app"
          install_profile "$watch_app_profile_base64" "planini-$IOS_VARIANT-watch-app"
          install_profile "$watch_extension_profile_base64" "planini-$IOS_VARIANT-watch-extension"
          install_profile "$watch_widget_profile_base64" "planini-$IOS_VARIANT-watch-widget"
      - name: Write App Store Connect API key
        if: steps.variant.outputs.skip != 'true'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
      - name: Archive app
        if: steps.variant.outputs.skip != 'true'
        run: |
          cd ios/PlaniniIOS
          xcodebuild \
            -project PlaniniApp.xcodeproj \
            -scheme Planini \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/${{ steps.variant.outputs.ipa_basename }}.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION="$IOS_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$IOS_BUILD_NUMBER" \
            INFOPLIST_KEY_CFBundleDisplayName="${{ steps.variant.outputs.app_display_name }}" \
            CODE_SIGN_STYLE=Manual \
            PLANINI_APP_PROFILE_NAME="${{ steps.variant.outputs.profile_name }}" \
            PLANINI_WATCH_APP_PROFILE_NAME="${{ steps.variant.outputs.watch_app_profile_name }}" \
            PLANINI_WATCH_EXTENSION_PROFILE_NAME="${{ steps.variant.outputs.watch_extension_profile_name }}" \
            PLANINI_WATCH_WIDGET_PROFILE_NAME="${{ steps.variant.outputs.watch_widget_profile_name }}" \
            archive
      - name: Export App Store IPA
        if: steps.variant.outputs.skip != 'true'
        run: |
          cat > $RUNNER_TEMP/ExportOptions-app-store.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ steps.variant.outputs.bundle_id }}</key>
              <string>${{ steps.variant.outputs.profile_name }}</string>
              <key>de.malaber.planini.watchkitapp</key>
              <string>${{ steps.variant.outputs.watch_app_profile_name }}</string>
              <key>de.malaber.planini.watchkitapp.watchkitextension</key>
              <string>${{ steps.variant.outputs.watch_extension_profile_name }}</string>
              <key>de.malaber.planini.watchkitapp.widget</key>
              <string>${{ steps.variant.outputs.watch_widget_profile_name }}</string>
            </dict>
          </dict>
          </plist>
          PLIST
          cd ios/PlaniniIOS
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/${{ steps.variant.outputs.ipa_basename }}.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-app-store" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-app-store.plist"
          mkdir -p "$RUNNER_TEMP/artifacts"
          ipa_path="$(find "$RUNNER_TEMP/export-app-store" -maxdepth 1 -name '*.ipa' -print -quit)"
          cp "$ipa_path" "$RUNNER_TEMP/artifacts/${{ steps.variant.outputs.ipa_basename }}-app-store.ipa"
      - name: Export ad-hoc IPA
        id: ad_hoc
        if: steps.variant.outputs.skip != 'true' && env.EXPORT_AD_HOC == 'true'
        run: |
          case "$IOS_VARIANT" in
            production)
              ad_hoc_profile_base64="$AD_HOC_PROVISION_PROFILE_BASE64"
              ad_hoc_profile_name="$AD_HOC_PROVISION_PROFILE_NAME"
              ad_hoc_watch_app_profile_base64="$AD_HOC_WATCH_APP_PROVISION_PROFILE_BASE64"
              ad_hoc_watch_app_profile_name="$AD_HOC_WATCH_APP_PROVISION_PROFILE_NAME"
              ad_hoc_watch_extension_profile_base64="$AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_BASE64"
              ad_hoc_watch_extension_profile_name="$AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_NAME"
              ad_hoc_watch_widget_profile_base64="$AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_BASE64"
              ad_hoc_watch_widget_profile_name="$AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_NAME"
              ;;
            review)
              ad_hoc_profile_base64="${AD_HOC_REVIEW_PROVISION_PROFILE_BASE64:-$AD_HOC_PROVISION_PROFILE_BASE64}"
              ad_hoc_profile_name="${AD_HOC_REVIEW_PROVISION_PROFILE_NAME:-$AD_HOC_PROVISION_PROFILE_NAME}"
              ad_hoc_watch_app_profile_base64="${AD_HOC_REVIEW_WATCH_APP_PROVISION_PROFILE_BASE64:-$AD_HOC_WATCH_APP_PROVISION_PROFILE_BASE64}"
              ad_hoc_watch_app_profile_name="${AD_HOC_REVIEW_WATCH_APP_PROVISION_PROFILE_NAME:-$AD_HOC_WATCH_APP_PROVISION_PROFILE_NAME}"
              ad_hoc_watch_extension_profile_base64="${AD_HOC_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_BASE64:-$AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_BASE64}"
              ad_hoc_watch_extension_profile_name="${AD_HOC_REVIEW_WATCH_EXTENSION_PROVISION_PROFILE_NAME:-$AD_HOC_WATCH_EXTENSION_PROVISION_PROFILE_NAME}"
              ad_hoc_watch_widget_profile_base64="${AD_HOC_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_BASE64:-$AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_BASE64}"
              ad_hoc_watch_widget_profile_name="${AD_HOC_REVIEW_WATCH_WIDGET_PROVISION_PROFILE_NAME:-$AD_HOC_WATCH_WIDGET_PROVISION_PROFILE_NAME}"
              ;;
          esac
          if [ -z "$ad_hoc_profile_base64" ] || [ -z "$ad_hoc_profile_name" ] || \
             [ -z "$ad_hoc_watch_app_profile_base64" ] || [ -z "$ad_hoc_watch_app_profile_name" ] || \
             [ -z "$ad_hoc_watch_extension_profile_base64" ] || [ -z "$ad_hoc_watch_extension_profile_name" ] || \
             [ -z "$ad_hoc_watch_widget_profile_base64" ] || [ -z "$ad_hoc_watch_widget_profile_name" ]; then
            echo "Missing ad-hoc profile for $IOS_VARIANT" >&2
            exit 1
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          install_profile() {
            profile_base64="$1"
            label="$2"
            raw_path="$RUNNER_TEMP/$label.mobileprovision"
            plist_path="$RUNNER_TEMP/$label.plist"
            echo "$profile_base64" | base64 --decode > "$raw_path"
            security cms -D -i "$raw_path" > "$plist_path"
            uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$plist_path")"
            name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$plist_path")"
            cp "$raw_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
            echo "Installed provisioning profile '$name' for $label."
          }
          install_profile "$ad_hoc_profile_base64" "planini-$IOS_VARIANT-adhoc-app"
          install_profile "$ad_hoc_watch_app_profile_base64" "planini-$IOS_VARIANT-adhoc-watch-app"
          install_profile "$ad_hoc_watch_extension_profile_base64" "planini-$IOS_VARIANT-adhoc-watch-extension"
          install_profile "$ad_hoc_watch_widget_profile_base64" "planini-$IOS_VARIANT-adhoc-watch-widget"

          cat > $RUNNER_TEMP/ExportOptions-ad-hoc.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ steps.variant.outputs.bundle_id }}</key>
              <string>${ad_hoc_profile_name}</string>
              <key>de.malaber.planini.watchkitapp</key>
              <string>${ad_hoc_watch_app_profile_name}</string>
              <key>de.malaber.planini.watchkitapp.watchkitextension</key>
              <string>${ad_hoc_watch_extension_profile_name}</string>
              <key>de.malaber.planini.watchkitapp.widget</key>
              <string>${ad_hoc_watch_widget_profile_name}</string>
            </dict>
          </dict>
          </plist>
          PLIST
          cd ios/PlaniniIOS
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/${{ steps.variant.outputs.ipa_basename }}.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-ad-hoc" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-ad-hoc.plist"
          mkdir -p "$RUNNER_TEMP/artifacts"
          ipa_path="$(find "$RUNNER_TEMP/export-ad-hoc" -maxdepth 1 -name '*.ipa' -print -quit)"
          ad_hoc_artifact="$RUNNER_TEMP/artifacts/${{ steps.variant.outputs.ipa_basename }}-ad-hoc.ipa"
          cp "$ipa_path" "$ad_hoc_artifact"
          echo "ipa_path=$ad_hoc_artifact" >> "$GITHUB_OUTPUT"
      - name: Upload archive artifact
        if: steps.variant.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.variant.outputs.ipa_basename }}-archive
          retention-days: 14
          path: ${{ runner.temp }}/${{ steps.variant.outputs.ipa_basename }}.xcarchive
      - name: Upload App Store IPA artifact
        if: steps.variant.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.variant.outputs.ipa_basename }}-app-store-ipa
          retention-days: 14
          path: ${{ runner.temp }}/artifacts/${{ steps.variant.outputs.ipa_basename }}-app-store.ipa
      - name: Upload ad-hoc IPA artifact
        if: steps.variant.outputs.skip != 'true' && env.EXPORT_AD_HOC == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.variant.outputs.ipa_basename }}-ad-hoc-ipa
          retention-days: 14
          path: ${{ steps.ad_hoc.outputs.ipa_path }}
      - name: Upload IPA to TestFlight
        if: steps.variant.outputs.skip != 'true'
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/artifacts/${{ steps.variant.outputs.ipa_basename }}-app-store.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
