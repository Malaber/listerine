<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Listerine</title>
    <meta name="theme-color" content="#142a57" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Listerine" />
    <link rel="icon" type="image/png" href="/static/img/Favicon.png" />
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="app-wordmark" href="/" aria-label="Listerine home">
        <img class="app-wordmark-logo" src="/static/img/Listerine.png" alt="" />
        <span class="app-wordmark-copy">
          <strong>Listerine</strong>
          <span>Households and grocery lists</span>
        </span>
      </a>
      {% if is_authenticated %}
      <div class="app-header-actions">
        <a class="admin-link" href="/settings">Settings</a>
        {% if is_admin %}
        <a class="admin-link" href="/admin">Admin</a>
        {% endif %}
        <form method="post" action="/logout">
          <button class="logout-button" type="submit">Logout</button>
        </form>
      </div>
      {% endif %}
    </header>
    <main>{% block content %}{% endblock %}</main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
