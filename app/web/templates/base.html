<!doctype html>
<html lang="{{ locale }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{{ t("common.app_name") }}</title>
    <meta
      name="description"
      content="Listerine helps households share grocery lists, track items, and stay in sync."
    />
    <link rel="canonical" href="{{ canonical_url }}" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{ t("common.app_name") }}" />
    <meta property="og:title" content="{{ t("common.app_name") }}" />
    <meta
      property="og:description"
      content="Shared shopping lists and household coordination in one app."
    />
    <meta property="og:image" content="/static/img/Listerine.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ t("common.app_name") }}" />
    <meta
      name="twitter:description"
      content="Shared shopping lists and household coordination in one app."
    />
    <meta name="twitter:image" content="/static/img/Listerine.png" />
    <meta name="theme-color" content="#142a57" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="{{ t("common.app_name") }}" />
    <link rel="icon" type="image/png" href="/static/img/Favicon.png" />
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/static/app.css?v={{ static_asset_version }}" />
  </head>
  <body>
    <header class="app-header">
      <a class="app-wordmark" href="/?dashboard=1" aria-label="{{ t("common.home_aria") }}">
        <img class="app-wordmark-logo" src="/static/img/Listerine.png" alt="" />
        <span class="app-wordmark-copy">
          <strong>{{ t("common.app_name") }}</strong>
          <span>{{ t("common.app_tagline") }}</span>
        </span>
      </a>
      {% if is_authenticated %}
      <div class="app-header-actions">
        <a class="admin-link" href="/settings">{{ t("common.settings") }}</a>
        {% if is_admin %}
        <a class="admin-link" href="/admin">{{ t("common.admin") }}</a>
        {% endif %}
        <form method="post" action="/logout">
          <button class="logout-button" type="submit">{{ t("common.logout") }}</button>
        </form>
      </div>
      {% endif %}
    </header>
    <main>{% block content %}{% endblock %}</main>
    <script>
      window.__appI18n = {{ {"locale": locale, "catalogBase64": i18n_catalog_b64}|tojson }};
    </script>
    <script type="module" src="/static/app.js?v={{ static_asset_version }}"></script>
  </body>
</html>
