    <rect x="134" y="0" width="132" height="44" rx="22" fill="#85ab43"/>
    <rect x="284" y="0" width="142" height="44" rx="22" fill="#eb5b33"/>
    <text x="28" y="30" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#3f2a1f">lists</text>
    <text x="160" y="30" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#20351f">sync</text>
    <text x="312" y="30" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#fffaf0">done</text>
