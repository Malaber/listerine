{% extends "sqladmin/layout.html" %}

{% block content %}
<div class="col-12">
  <div class="card">
    <div class="card-body d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
      <div>
        <h3 class="card-title mb-1">Admin tools</h3>
        <p class="text-muted mb-1">Manage shared categories, admin access, and database backups, then jump back into the shopping app.</p>
        <p class="mb-0"><strong>Planini version:</strong> <code>{{ planini_version }}</code></p>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-outline-primary" href="{{ url_for('admin:backups') }}">Backups</a>
        <a class="btn btn-primary" href="/">Go to application</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
